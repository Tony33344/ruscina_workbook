<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Диалог 2 — Русский язык</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f7f9fb;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      max-width: 800px;
      width: 100%;
      padding: 3rem;
      text-align: center;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #8a8a8a;
      margin-bottom: 2rem;
    }
    .subtitle-box {
      font-size: 1.6rem;
      line-height: 2;
      margin: 2rem 0;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1rem;
    }
    .sentence {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      transition: all 0.4s ease;
      color: #b0b0b0;
    }
    .sentence.active {
      color: #1a1a1a;
      background: #e8f4ff;
      transform: scale(1.03);
    }
    .audio-wrap {
      margin-top: 2rem;
    }
    audio {
      width: 100%;
      outline: none;
      border-radius: 12px;
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    button {
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 50px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s ease;
      font-family: inherit;
    }
    button:hover {
      background: #333;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #1a1a1a;
      width: 0%;
      transition: width 0.1s linear;
    }
    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
      }
      .subtitle-box {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Упражнение 2</h1>

    <div class="subtitle-box" id="subtitleBox">
      <span class="sentence" data-index="0">Меня зовут Мая.</span>
      <span class="sentence" data-index="1">Я пенсионерка, поэтому у меня есть время и я много читаю и смотрю ТВ.</span>
      <span class="sentence" data-index="2">Я часто гуляю, потому что у меня есть собака.</span>
      <span class="sentence" data-index="3">Я очень люблю свой дом и много работаю в саду.</span>
      <span class="sentence" data-index="4">Ещё у меня есть сын и внуки.</span>
      <span class="sentence" data-index="5">Они любят играть, поэтому мы часто ходим в парк.</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="audio-wrap">
      <audio id="audio" controls preload="metadata">
        <source src="audiovoice/2. dialog Olga Orlova - Clear and Engaging_pvc_sp100_s50_sb75_v3 (1).mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
      </audio>
    </div>

    <div class="controls">
      <button id="replayBtn">↺ Повторить</button>
    </div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const sentences = document.querySelectorAll('.sentence');
    const progressFill = document.getElementById('progressFill');
    const replayBtn = document.getElementById('replayBtn');

    // Evenly distribute time across sentences
    function updateHighlight() {
      if (!audio.duration) return;
      const current = audio.currentTime;
      const total = audio.duration;
      const count = sentences.length;
      const segment = total / count;
      const index = Math.min(Math.floor(current / segment), count - 1);

      sentences.forEach((s, i) => {
        if (i === index) {
          s.classList.add('active');
        } else {
          s.classList.remove('active');
        }
      });

      progressFill.style.width = (current / total * 100) + '%';
    }

    audio.addEventListener('timeupdate', updateHighlight);
    audio.addEventListener('ended', () => {
      sentences.forEach(s => s.classList.remove('active'));
      progressFill.style.width = '100%';
    });

    replayBtn.addEventListener('click', () => {
      audio.currentTime = 0;
      audio.play();
    });

    // Click a sentence to jump roughly to that segment
    sentences.forEach((s, i) => {
      s.style.cursor = 'pointer';
      s.addEventListener('click', () => {
        if (audio.duration) {
          const segment = audio.duration / sentences.length;
          audio.currentTime = segment * i;
          audio.play();
        }
      });
    });
  </script>
</body>
</html>
