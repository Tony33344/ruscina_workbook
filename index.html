<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Русский язык — Диалоги</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f7f9fb;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      max-width: 900px;
      width: 100%;
      padding: 3rem;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #8a8a8a;
      margin-bottom: 1rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #b0b0b0;
      margin-bottom: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }
    .dialog-btn {
      background: #7cb342;
      color: #fff;
      border: none;
      padding: 1.2rem 1rem;
      border-radius: 14px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .dialog-btn:hover {
      background: #8bc34a;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(124, 179, 66, 0.3);
    }
    .dialog-btn .num {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.2rem;
    }
    .dialog-btn .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }
    @media (max-width: 600px) {
      .card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Русский язык</h1>
    <p class="subtitle">Выберите диалог для прослушивания</p>
    <div class="grid">
      <a href="1.html" class="dialog-btn"><span class="num">1</span><span class="label">Диалог</span></a>
      <a href="2.html" class="dialog-btn"><span class="num">2</span><span class="label">Диалог</span></a>
      <a href="3.html" class="dialog-btn"><span class="num">3</span><span class="label">Диалог</span></a>
      <a href="4.html" class="dialog-btn"><span class="num">4</span><span class="label">Диалог</span></a>
      <a href="5.html" class="dialog-btn"><span class="num">5</span><span class="label">Диалог</span></a>
      <a href="6.html" class="dialog-btn"><span class="num">6</span><span class="label">Диалог</span></a>
      <a href="7.html" class="dialog-btn"><span class="num">7</span><span class="label">Диалог</span></a>
      <a href="8.html" class="dialog-btn"><span class="num">8</span><span class="label">Диалог</span></a>
      <a href="9.html" class="dialog-btn"><span class="num">9</span><span class="label">Диалог</span></a>
      <a href="10.html" class="dialog-btn"><span class="num">10</span><span class="label">Диалог</span></a>
      <a href="11.html" class="dialog-btn"><span class="num">11</span><span class="label">Диалог</span></a>
      <a href="12.html" class="dialog-btn"><span class="num">12</span><span class="label">Диалог</span></a>
      <a href="13.html" class="dialog-btn"><span class="num">13</span><span class="label">Диалог</span></a>
    </div>
  </div>
</body>
</html>
